# 缓存服务配置 (Production)
spring:
  config:
    activate:
      on-profile: prod

  # Spring Data Redis 配置
  data:
    redis:
      database: ${prod.redis.database:0}
      host: ${prod.redis.host:localhost}
      port: ${prod.redis.port:6379}
      password: ${prod.redis.password:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 10
          min-idle: 5

# Caffeine 本地缓存配置
caffeine:
  enabled: true
  expired: 300
  initCapacity: 100
  maxCapacity: 10000
