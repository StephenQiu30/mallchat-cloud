# 公共Web/业务配置文件 (Production)

server:
  servlet:
    context-path: /api

spring:
  config:
    activate:
      on-profile: prod
  # MVC 配置
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # Session 配置
  session:
    store-type: redis
    timeout: 2592000
  # 缓存配置
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterAccess=600s

# 统一日志配置
logging:
  config: classpath:logback-spring.xml

# Logstash 配置
logstash:
  host: logstash
  port: 5000

# Sa-Token 配置 (Prod)
sa-token:
  enable-sa: true
  enable-jwt: true
  token-name: Authorization
  timeout: 2592000
  active-timeout: 604800
  is-concurrent: false
  is-share: true
  token-style: uuid
  is-log: false
  token-prefix: Bearer
  jwt-secret-key: ${prod.sa-token.jwt-secret-key}

# 请求参数加密校验配置
encrypt:
  enable: true
  rsa-key-length: length4096
  aes-key-length: length32


# 监控配置: Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: 'health,info'
  endpoint:
    health:
      show-details: always
  health:
    elasticsearch:
      enabled: false
    redis:
      enabled: true
    rabbit:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
