# 社交登录配置文件 (Dev/Default)

spring:
  config:
    activate:
      on-profile: default

wx:
  # 微信小程序配置
  ma:
    app-id: ${dev.wx.ma.appId}
    app-secret: ${dev.wx.ma.appSecret}
  # 微信 App 配置 (Flutter)
  app:
    app-id: ${dev.wx.app.appId}
    app-secret: ${dev.wx.app.appSecret}

# Apple 登录配置
apple:
  client-id: ${dev.apple.clientId}
