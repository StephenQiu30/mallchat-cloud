# 缓存服务配置 (通用)
spring:
  config:
    activate:
      on-profile: default

  # Spring Data Redis 配置
  data:
    redis:
      database: ${dev.redis.database:0}
      host: ${dev.redis.host:localhost}
      port: ${dev.redis.port:6379}
      password: ${dev.redis.password:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 20
          max-wait: -1
          max-idle: 10
          min-idle: 5

# Caffeine 本地缓存配置
caffeine:
  enabled: true
  expired: 300
  initCapacity: 100
  maxCapacity: 10000
